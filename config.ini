[data]
input_path = data/energy_demand.csv
date_column = timestamp
target_column = demand_mw
train_ratio = 0.8

[model]
algorithm = xgboost
n_estimators = 300
max_depth = 6
learning_rate = 0.05

[output]
predictions_path = output/predictions.csv
model_path = models/demand_model.pkl
figures_dir = output/figures
